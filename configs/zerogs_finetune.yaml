experiment:
  name: zerogs_finetune
  output_dir: outputs/zerogs_finetune
  seed: 42

data:
  train_root: dataset/renders_256
  val_root: dataset/renders_256
  image_size: 256
  num_workers: 4
  max_train_samples: null
  max_val_samples: null

model:
  in_channels: 9
  num_views: 7
  image_size: 256
  splat_size: 64
  base_channels: 64
  depth_min: 2.5
  depth_max: 5.5
  offset_scale: 0.05
  opacity_bias: 4.0

renderer:
  image_size: 256
  background: white
  near_plane: 0.01
  far_plane: 100.0
  radius_clip: 0.0
  eps2d: 0.3
  packed: true
  tile_size: 16
  rasterize_mode: classic

loss:
  lambda_rgb: 1.0
  lambda_mask: 0.5
  lambda_lpips: 0.1
  use_lpips: true
  lpips_net: vgg
  lpips_chunk_size: 1
  mask_rgb_loss: true

train:
  epochs: 100
  batch_size: 1
  lr: 1.0e-6
  weight_decay: 0.01
  amp: true
  grad_clip: 1.0
  scheduler: cosine
  log_every: 10
  vis_every: 200
  epoch_visuals: true
  save_every: 1
  val_every: 1
  overfit_one_batch: false
  overfit_steps: 300

performance:
  enabled: true
  ema_momentum: 0.8
  sync_cuda: true
  write_every: 10
  system_sample_every: 10
  sample_system: true
  sample_gpu_utilization: true
  profile_gpu_modules: true
